# ============================================================
#  Deploy Zest Admin Panel to GitHub Pages
#  Firebase credentials are injected from GitHub Secrets
#  so the repo can remain PUBLIC safely.
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Inject Firebase config from GitHub Secrets
      - name: Generate firebase-config.js
        run: |
          cat > admin/firebase-config.js << 'SCRIPT'
          window.ZEST_FIREBASE_CONFIG = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}"
          };
          window.ZEST_ADMIN_EMAIL = "${{ secrets.ZEST_ADMIN_EMAIL }}";
          SCRIPT

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
